name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: test go
        run: go test -v -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: test desktop frontend
        run: |
          cd desktop/frontend
          bun install
          bun run test

      - name: build desktop frontend
        run: |
          cd desktop/frontend
          bun install
          bun run build
